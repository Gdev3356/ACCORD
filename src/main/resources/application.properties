spring.application.name=accord

# ?? Datasource ????????????????????????????????????????????????
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# ?? JPA ???????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.defer-datasource-initialization=true

# ?? File upload ???????????????????????????????????????????????
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB
logging.level.software.amazon.awssdk=DEBUG
logging.level.com.main.accord=DEBUG

# ?? Verification email ?????????????????????????????????????????
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=accord.official271@gmail.com
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# ?? Supabase ??????????????????????????????????????????????????
supabase.storage.endpoint=https://cojruuhnbufkhffchsxp.storage.supabase.co/storage/v1/s3
supabase.storage.access-key=${ACCESS_KEY}
supabase.storage.secret-key=${SECRET_KEY}
supabase.storage.bucket=accord-media
supabase.storage.public-url=https://cojruuhnbufkhffchsxp.supabase.co/storage/v1/object/public

# ?? Accord ????????????????????????????????????????????????????
accord.frontend.url=http://localhost:5173
accord.encryption.key=${ACCORD_ENCRYPTION_KEY}
accord.jwt.secret=${ACCORD_JWT_SECRET}

# ?? Server ????????????????????????????????????????????????????
server.port=${PORT:8080}