spring.application.name=accord

# ?? Datasource ????????????????????????????????????????????????
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.max-lifetime=55000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.keepalive-time=20000
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.connection-test-query=SELECT 1
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# ?? JPA ???????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.connection.handling_mode=DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION

# ?? File upload ???????????????????????????????????????????????
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB
logging.level.software.amazon.awssdk=DEBUG
logging.level.com.main.accord=DEBUG

# ?? Supabase ??????????????????????????????????????????????????
supabase.storage.endpoint=https://cojruuhnbufkhffchsxp.storage.supabase.co/storage/v1/s3
supabase.storage.access-key=${ACCESS_KEY}
supabase.storage.secret-key=${SECRET_KEY}
supabase.storage.bucket=accord-media
supabase.storage.public-url=https://cojruuhnbufkhffchsxp.supabase.co/storage/v1/object/public

# ?? Accord ????????????????????????????????????????????????????
accord.frontend.url=${ACCORD_URL}
accord.encryption.key=${ACCORD_ENCRYPTION_KEY}
accord.jwt.secret=${ACCORD_JWT_SECRET}

# ?? Server ????????????????????????????????????????????????????
server.port=${PORT:8080}

# ?? Keep-alive (prevents Render free tier cold starts) ????????
management.endpoints.web.exposure.include=health