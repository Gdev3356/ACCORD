spring.application.name=accord

# ?? Datasource ????????????????????????????????????????????????
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# ?? JPA ???????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public

# ?? File upload ???????????????????????????????????????????????
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=30MB

# ?? Supabase ??????????????????????????????????????????????????
supabase.jwt.secret=${DB_JWT_KEY}
supabase.storage.endpoint=${S3_ENDPOINT}
supabase.storage.access-key=${ACCESS_KEY}
supabase.storage.secret-key=${SECRET_KEY}
supabase.storage.bucket=accord-media
supabase.storage.public-url=${PUBLIC_URL}

# ?? Accord ????????????????????????????????????????????????????
accord.frontend.url=http://localhost:5173
accord.encryption.key=${ACCORD_ENCRYPTION_KEY}

# ?? Server ????????????????????????????????????????????????????
server.port=${PORT:8080}